<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance prolongée • TYPH X-CHAIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0B1A33;
            color: #F0F4FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            padding: 20px;
        }

        .maintenance-card {
            background: #132B4A;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 520px;
            width: 100%;
            border: 1px solid #3D5C86;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 16px #1E3A5F);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #FFFFFF, #60A5FA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #B0C4DE;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message {
            background: #1E3A5F;
            border-radius: 28px;
            padding: 20px;
            margin: 25px 0;
            border-left: 4px solid #3B82F6;
            text-align: left;
            color: #F0F4FA;
        }

        .message p {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message i {
            color: #3B82F6;
            width: 24px;
            font-size: 1.2rem;
        }

        .eta {
            background: #2B4C7C;
            border-radius: 50px;
            padding: 12px 20px;
            display: inline-block;
            font-weight: 600;
            color: #FFFFFF;
            margin: 15px 0 10px;
            border: 1px solid #3B82F6;
        }

        .eta i {
            margin-right: 8px;
            color: #F0B90B;
        }

        .social {
            margin: 30px 0 20px;
        }

        .social a {
            color: #B0C4DE;
            text-decoration: none;
            font-size: 2rem;
            margin: 0 12px;
            transition: color 0.2s ease;
        }

        .social a:hover {
            color: #3B82F6;
        }

        .footer {
            font-size: 0.9rem;
            color: #5D7AA0;
            border-top: 1px solid #2D4B73;
            padding-top: 20px;
            margin-top: 20px;
        }

        .footer a {
            color: #60A5FA;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Animation optionnelle pour l'icône */
        .fa-tools {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <!-- Font Awesome 6 -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        
        <div class="icon">
            <i class="fas fa-tools"></i>
        </div>
        
        <h1>TYPH X-CHAIN</h1>
        <div class="subtitle">⏳ Maintenance en cours</div>
        
        <div class="message">
            <p><i class="fas fa-clock"></i> <strong>Intervention technique prolongée</strong></p>
            <p><i class="fas fa-database"></i> Mise à jour majeure de nos infrastructures</p>
            <p><i class="fas fa-shield-alt"></i> Sécurité & performances renforcées</p>
            <p><i class="fas fa-hourglass-end"></i> <strong>Durée estimée : quelques heures</strong></p>
        </div>
        
        <div class="eta">
            <i class="fas fa-clock"></i> Retour progressif dans la journée
        </div>
        
        <div class="social">
            <a href="https://www.facebook.com/Typh.Exchange.Ofisialy" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" onclick="alert('Support joignable après la maintenance. Merci de votre patience.'); return false;" title="Support"><i class="fas fa-headset"></i></a>
        </div>
        
        <div class="footer">
            © 2026 TYPH X-CHAIN • <a href="#" onclick="alert('Le site est momentanément indisponible.'); return false;">typhxchain.com</a>
        </div>
    </div>
</body>
</html>
